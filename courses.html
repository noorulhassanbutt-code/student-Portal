<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Courses | Student Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy: #0d1b2a;
      --sky: #00b4d8;
      --accent: #f4a261;
      --light: #e8f4f8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: #fff; min-height: 100vh; }
    .navbar {
      background: rgba(13,27,42,0.97) !important;
      border-bottom: 2px solid var(--sky);
      padding: 1rem 2rem;
    }
    .navbar-brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; color: var(--sky) !important; }
    .nav-link { font-family: 'Syne', sans-serif; color: var(--light) !important; font-weight: 600; margin: 0 5px; }
    .nav-link:hover { color: var(--accent) !important; }
    .nav-link.active-link { color: var(--sky) !important; }

    .page-wrap { max-width: 820px; margin: 0 auto; padding: 60px 24px; }

    .page-header { margin-bottom: 44px; animation: fadeUp 0.5s ease both; }
    .page-header .badge-tag {
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--sky);
      font-weight: 600;
      margin-bottom: 10px;
      display: block;
    }
    .page-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2.4rem;
      font-weight: 800;
    }
    .page-header h1 span { color: var(--sky); }
    .page-header p { color: rgba(255,255,255,0.5); margin-top: 8px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Course cards */
    .course-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(0,180,216,0.15);
      border-radius: 16px;
      padding: 22px 24px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 20px;
      cursor: pointer;
      transition: all 0.25s;
      animation: fadeUp 0.5s ease both;
    }
    .course-card:nth-child(2) { animation-delay: 0.1s; }
    .course-card:nth-child(3) { animation-delay: 0.2s; }
    .course-card:nth-child(4) { animation-delay: 0.3s; }
    .course-card:hover {
      border-color: var(--sky);
      background: rgba(0,180,216,0.08);
      transform: translateX(6px);
    }
    .course-card.selected {
      border-color: var(--sky);
      background: rgba(0,180,216,0.12);
    }
    .course-card input[type="checkbox"] {
      width: 22px; height: 22px;
      accent-color: var(--sky);
      cursor: pointer;
      flex-shrink: 0;
    }
    .course-icon { font-size: 2rem; flex-shrink: 0; }
    .course-info { flex: 1; }
    .course-info h5 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .course-info p { color: rgba(255,255,255,0.5); font-size: 0.88rem; }
    .course-badge {
      background: rgba(0,180,216,0.15);
      color: var(--sky);
      font-size: 0.72rem;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      letter-spacing: 0.5px;
      padding: 4px 12px;
      border-radius: 50px;
      flex-shrink: 0;
    }

    .btn-submit {
      background: var(--sky);
      color: var(--navy);
      border: none;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      padding: 14px 36px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.25s;
      margin-top: 10px;
      display: inline-block;
    }
    .btn-submit:hover {
      background: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(244,162,97,0.3);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      margin-top: 30px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--sky); }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">🎓 Student Portal</a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon" style="filter:invert(1)"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navMenu">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="registration.html">Registration</a></li>
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link active-link" href="courses.html">Courses</a></li>
          <li class="nav-item"><a class="nav-link" href="feedback.html">Feedback</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="page-wrap">
    <div class="page-header">
      <span class="badge-tag">Semester Enrollment</span>
      <h1>Select Your <span>Courses</span></h1>
      <p>Choose the courses you want to enroll in this semester. You can select multiple.</p>
    </div>

    <!-- Course List -->
    <div id="courseList">
      <label class="course-card" onclick="toggleCard(this)">
        <input type="checkbox" name="course" value="Web Development"/>
        <div class="course-icon">🌐</div>
        <div class="course-info">
          <h5>Web Development</h5>
          <p>HTML, CSS, JavaScript, Bootstrap, React, and modern web technologies.</p>
        </div>
        <span class="course-badge">Core</span>
      </label>

      <label class="course-card" onclick="toggleCard(this)">
        <input type="checkbox" name="course" value="Artificial Intelligence"/>
        <div class="course-icon">🤖</div>
        <div class="course-info">
          <h5>Artificial Intelligence</h5>
          <p>Machine learning, neural networks, NLP and AI-powered applications.</p>
        </div>
        <span class="course-badge">Advanced</span>
      </label>

      <label class="course-card" onclick="toggleCard(this)">
        <input type="checkbox" name="course" value="Database Systems"/>
        <div class="course-icon">🗄️</div>
        <div class="course-info">
          <h5>Database Systems</h5>
          <p>SQL, NoSQL, ER modeling, database design and query optimization.</p>
        </div>
        <span class="course-badge">Core</span>
      </label>

      <label class="course-card" onclick="toggleCard(this)">
        <input type="checkbox" name="course" value="Mobile App Development"/>
        <div class="course-icon">📱</div>
        <div class="course-info">
          <h5>Mobile App Development</h5>
          <p>Android, iOS, Flutter, and React Native cross-platform development.</p>
        </div>
        <span class="course-badge">Elective</span>
      </label>
    </div>

    <div class="mt-4">
      <button class="btn-submit" onclick="submitCourses()">✅ Submit Courses</button>
    </div>

    <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function toggleCard(label) {
      const cb = label.querySelector('input[type="checkbox"]');
      label.classList.toggle('selected', cb.checked);
    }

    function submitCourses() {
      const checkboxes = document.querySelectorAll('input[name="course"]:checked');
      if (checkboxes.length === 0) {
        alert('⚠️ Please select at least one course before submitting.');
        return;
      }
      const selected = Array.from(checkboxes).map(cb => '• ' + cb.value).join('\n');
      alert(`✅ Courses Submitted Successfully!\n\nYou have enrolled in:\n${selected}\n\nGood luck this semester!`);
    }
  </script>
</body>
</html>
